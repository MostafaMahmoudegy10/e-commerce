spring.datasource.url=jdbc:h2:mem:testdb;mode=mysql
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

app.security.jwt.issuer=test-issuer
app.security.jwt.audience=test-audience
app.security.jwt.secret=test-secret-key-for-hmac-signing-12345

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/h2
